[pytest]
testpaths = tests
markers =
    integration: tests requiring a live API key (deselect with -m "not integration")
    ffmpeg: tests requiring FFmpeg installed (auto-skipped if not found)
    tiktok: tests requiring TikTok API credentials (auto-skipped if not set)
    kalodata: tests requiring Kalodata credentials (auto-skipped if not set)
    whisper: tests requiring Whisper installed (auto-skipped if not found)
    analyzer: tests for the video analysis pipeline
addopts = -v --tb=short --no-header -q
